<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">

        <h1>Smart Expense Tracker</h1>

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
        >

        <button
            type="button"
            onclick="loginUser()"
        >
            Login
        </button>

        <p>

            Don't have account?

            <a href="register.html">
                Register
            </a>

        </p>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
